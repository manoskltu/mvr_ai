{% extends "base.html" %}

{% block title %}Plan Editor — {{ attachment.filename }} — FS Mide Offer Tool{% endblock %}

{% block content %}
<div class="container">
    <a href="{{ url_for('data.plan_index') }}" class="back-link">&larr; Tillbaka till Plan</a>

    <h1>{{ attachment.filename }}</h1>

    <!-- Toolbar -->
    <div class="plan-toolbar">
        <button id="btn-draw" class="btn btn-icon btn-secondary" onclick="setMode('draw')" title="Rita (draw)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                <path d="m15 5 4 4"/>
            </svg>
        </button>
        <button id="btn-select" class="btn btn-icon btn-secondary active" onclick="setMode('select')" title="Välj (select)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                <path d="M13 13l6 6"/>
            </svg>
        </button>
        <button id="btn-pan" class="btn btn-icon btn-secondary" onclick="setMode('pan')" title="Panorera (pan)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 11V6a2 2 0 0 0-4 0v5"/>
                <path d="M14 10V4a2 2 0 0 0-4 0v6"/>
                <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
                <path d="M18 11a2 2 0 0 1 4 0v5a8 8 0 0 1-8 8h-2c-2.5 0-4.5-1-6.2-2.8L3 18.5"/>
            </svg>
        </button>
        <button id="btn-delete" class="btn btn-icon btn-danger" onclick="deleteSelected()" title="Ta bort (delete)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"/>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
        </button>

        <div class="plan-page-nav">
            <button id="btn-prev" class="btn btn-secondary" onclick="prevPage()" disabled>&larr;</button>
            <span id="page-indicator">Sida 1 / ?</span>
            <button id="btn-next" class="btn btn-secondary" onclick="nextPage()">&rarr;</button>
        </div>

        <div class="plan-zoom-controls">
            <button class="btn btn-secondary btn-icon" onclick="zoomOut()" title="Zooma ut (-)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <input type="range" id="zoom-slider" min="25" max="800" value="100" step="5" oninput="setZoom(this.value)">
            <button class="btn btn-secondary btn-icon" onclick="zoomIn()" title="Zooma in (+)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span id="zoom-level" class="zoom-level-text">100%</span>
        </div>

        <div class="plan-toolbar-spacer"></div>

        <button id="btn-analyze" class="btn btn-primary" onclick="triggerAnalysis()" title="Analysera denna PDF">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.3-4.3"/>
            </svg>
            Analysera
        </button>
    </div>

    <!-- Loading indicator -->
    <div id="loading-indicator" class="loading-indicator">
        <div class="spinner"></div>
        <span>Laddar ritning...</span>
    </div>

    <!-- Editor container -->
    <div class="plan-editor-container" id="editor-container" data-attachment-id="{{ attachment.id }}" data-record-id="{{ attachment.email_record_id }}">
        <img id="page-image" src="" alt="PDF-sida">
        <canvas id="annotation-canvas"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/plan_editor.js') }}"></script>
{% endblock %}
