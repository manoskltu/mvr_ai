{% extends "base.html" %}

{% block title %}Plan Editor — {{ attachment.filename }} — FS Mide Offer Tool{% endblock %}

{% block content %}
<div class="container">
    <a href="{{ url_for('data.plan_index') }}" class="back-link">&larr; Tillbaka till Plan</a>

    <h1>{{ attachment.filename }}</h1>

    <!-- Toolbar -->
    <div class="plan-toolbar">
        <button id="btn-draw" class="btn btn-secondary" onclick="setMode('draw')">Rita</button>
        <button id="btn-select" class="btn btn-secondary active" onclick="setMode('select')">Välj</button>
        <button id="btn-delete" class="btn btn-danger" onclick="deleteSelected()">Ta bort</button>

        <div class="plan-page-nav">
            <button id="btn-prev" class="btn btn-secondary" onclick="prevPage()" disabled>&larr; Föregående</button>
            <span id="page-indicator">Sida 1 / ?</span>
            <button id="btn-next" class="btn btn-secondary" onclick="nextPage()">Nästa &rarr;</button>
        </div>
    </div>

    <!-- Editor container -->
    <div class="plan-editor-container" id="editor-container" data-attachment-id="{{ attachment.id }}">
        <img id="page-image" src="" alt="PDF-sida">
        <canvas id="annotation-canvas"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/plan_editor.js') }}"></script>
{% endblock %}
