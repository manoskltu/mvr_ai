{% extends "base.html" %}

{% block title %}Lägg till post — FS Mide Offer Tool{% endblock %}

{% block content %}
<div class="container">
    <a href="{{ url_for('data.data_index') }}" class="back-link">&larr; Tillbaka till Data</a>

    <h1>Lägg till post manuellt</h1>

    {% if errors %}
    <div class="validation-errors">
        <ul>
            {% for error in errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <form action="{{ url_for('data.manual_submit') }}" method="post" class="manual-form">
        <div class="form-group">
            <label for="sender">Avsändare *</label>
            <input type="text" id="sender" name="sender" value="{{ form_data.get('sender', '') }}" required>
        </div>

        <div class="form-group">
            <label for="recipient">Mottagare</label>
            <input type="text" id="recipient" name="recipient" value="{{ form_data.get('recipient', '') }}">
        </div>

        <div class="form-group">
            <label for="subject">Ämne *</label>
            <input type="text" id="subject" name="subject" value="{{ form_data.get('subject', '') }}" required>
        </div>

        <div class="form-group">
            <label for="date">Datum</label>
            <input type="datetime-local" id="date" name="date" value="{{ form_data.get('date', '') }}">
        </div>

        <div class="form-group">
            <label for="body_text">Meddelandetext</label>
            <textarea id="body_text" name="body_text" rows="8">{{ form_data.get('body_text', '') }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Spara</button>
    </form>
</div>
{% endblock %}
